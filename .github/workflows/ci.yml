name: CI

# Lint + typecheck + tests on every push and PR. Note: this does NOT gate
# deploys — Cloudflare Workers Builds deploys main on push regardless of
# these checks. To make a failing suite abort the deploy, set the Workers
# Builds build command (Cloudflare dashboard) to run `npm test` first.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
