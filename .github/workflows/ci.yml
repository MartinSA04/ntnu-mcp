name: CI

# Lint + typecheck + tests on every push and PR. Deploys are tag-driven
# through the release workflow (which re-runs these checks first); pushes
# to main do not deploy once the Workers Builds Git integration is
# disconnected in the Cloudflare dashboard.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
